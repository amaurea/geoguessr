<html>
	<head>
		<style>
			#map     { width: 100%; height: 60vh; }
			body     { text-align: center; }
			table    { margin-left: auto; margin-right: auto; }
		</style>
		<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBm10t_NikqDRKpHzuMAIdvdFBn90AnGvE&libraries=geometry">
		</script>
		<script src=geoguessr.js></script>
	</head>
	<body>
		<form name=form>
			<h1>Geoguessr builder</h1>
			<table>
				<tr><th>Rounds</th><td><input type=number id=ntask name=ntask value=5></td></tr>
				<tr><th>Area</th><td>Whole world by default, draw polygon to restrict</td></tr>
			</table>
			<div id=map></div>
			<table>
				<tr><td colspan=2><button onclick=undo_point() form=dummy>Undo point</button></td></tr>
				<tr><th>Images</th><td>
					<input type=checkbox id=roadonly name=roadonly value=1>
					<label for=roadonly>Roads only</label>
					<input type=checkbox id=nearest  name=nearest  value=0>
					<label for=nearest>Prefer "good" locations</label>
				</td></tr>
				<tr><th>Spread</th><td>
					<input type=checkbox id=spread name=spread value=0 form=dummy>
					<label for=spread>Maximize distance between points</label>
				</td></tr>
				<tr><th>Popdens</th><td>
					<input type=checkbox id=popdens name=popdens value=0 form=dummy>
					<label for=popdens>Weight by population density (only in Norway)</label>
				</td></tr>
				<tr><th>Mindens</th><td>
					<input type=number step=any min=0 id=mindens name=mindens value=0 size=6>
					<label for=mindens>Minimum population density (per km²) (only in Norway)</label>
				</td></tr>
				<!--
				<tr><th>Random</th><td>
					<input type=checkbox id=random name=random value=0 form=dummy>
					<label for=random>Reroll locations each time this URL is used</label>
				</td></tr>
				-->
				<tr><th>Tolerance</th><td>
						<input type=number id=tol step=any name=tol value=0 size=6>
						<label for=tol>Award max score if closer than this in meters</label>
					</td></tr>
			</table>
			<button id=submit_button onclick="submit(false)" form=dummy">Submit</button>
			<button id=save_button   onclick="save(false)" form=dummy>Save</button>
		</form>
		<script>
			var map_div = document.getElementById("map");
			var map     = new google.maps.Map(map_div, {
				center: {lat:0,lng:0},
				zoom: 1,
				clickableIcons: false,
				mapTypeId: google.maps.MapTypeId.SATELLITE,
				zoomControlOptions: { position: google.maps.ControlPosition.TOP_LEFT },
				gestureHandling: "greedy",
			});
			var path = new google.maps.Polygon({
					path: new google.maps.MVCArray(),
					strokeColor: "red",
					strokeOpacity: 1.0,
					strokeWeight: 3,
					fillColor: "red",
					fillOpacity: 0.1,
					editable: true,
					map: map,
				});
			// Will hold the point positions when generated
			var points = null;

			google.maps.event.addListener(map, 'click', function (e) {
					if(e.domEvent.shiftKey) {
						query_popinfo(e.latLng);
					} else {
						path.getPath().push(e.latLng);
					}
				});

			// debug stuff, for letting us get the population
			// density in a point. It will store the population
			// density information, but won't be initialized until
			// needed
			var debug = {popinfo:null, latorder:null, lonorder:null, res:null};
			async function query_popinfo(pos) {
				if(!debug.popinfo) {
					debug.popinfo = await geoguessr.read_popinfo("norge_tetthet_250.txt", 0, false);
					debug.lonorder = geoguessr.argsort(debug.popinfo[0]);
					debug.latorder = geoguessr.argsort(debug.popinfo[1]);
					debug.res      = debug.popinfo[2][0]+debug.popinfo[3][0]*2;
				}
				// Find nearby cells
				ilat1 = geoguessr.argbinsearch(debug.popinfo[1], debug.latorder, pos.lat()-debug.res);
				ilat2 = geoguessr.argbinsearch(debug.popinfo[1], debug.latorder, pos.lat()+debug.res);
				var cands = [];
				for(var ilat = ilat1; ilat <= ilat2; ilat++) {
					var i   = debug.latorder[ilat];
					var lon = debug.popinfo[0][i];
					if(lon >= pos.lng()-debug.res && lon <= pos.lng()+debug.res)
						cands.push(i);
				}
				// Now find the one closest to our point
				var besti    = -1;
				var bestdist = 1e100;
				var moo = [];
				for(var ci = 0; ci < cands.length; ci++) {
					// overkill
					var i    = cands[ci];
					var dist = google.maps.geometry.spherical.computeDistanceBetween(pos, new google.maps.LatLng(debug.popinfo[1][i], debug.popinfo[0][i]));
					moo.push(dist);
					if(dist < bestdist) {
						besti = i;
						bestdist = dist;
					}
				}
				if(besti < 0) {
					console.log("density", pos.lat(),pos.lng(),"no match")
				} else {
					// Finally make a popup with the density here
					var w     = debug.popinfo[2][besti]*geoguessr.deg*geoguessr.earth_radius*Math.cos(pos.lat()*geoguessr.deg)/1e3;
					var h     = debug.popinfo[3][besti]*geoguessr.deg*geoguessr.earth_radius/1e3;
					var dens  = debug.popinfo[4][besti]/(w*h);
					console.log("density",pos.lat(),pos.lng(),dens);
				}
			}

			async function load_settings() {
				var desc = await geoguessr.load_game_desc(window.location.search.slice(1));
				document.getElementById("ntask").value = desc.ntask;
				document.getElementById("roadonly").checked = desc.roadonly;
				document.getElementById("nearest").checked = !desc.nearest;
				document.getElementById("tol").value = desc.tol;
				document.getElementById("spread").checked = desc.spread;
				document.getElementById("popdens").checked = desc.popdens;
				document.getElementById("mindens").value = desc.mindens;
				if(desc.bounds.length >= 2) {
					var boundsobj = new google.maps.LatLngBounds();
					while(path.getPath().length > 0) path.getPath().pop();
					for(var i = 0; i < desc.bounds.length; i++) {
						path.getPath().push(desc.bounds[i]);
						boundsobj.extend(desc.bounds[i]);
					}
					map.fitBounds(boundsobj);
				}
			}

			load_settings();

			function settings_to_desc() {
				var desc = {
					ntask    : parseInt(document.getElementById("ntask").value)+0,
					roadonly : document.getElementById("roadonly").checked+0,
					nearest  : !document.getElementById("nearest").checked+0,
					tol      : parseFloat(document.getElementById("tol").value)+0,
					spread   : document.getElementById("spread").checked+0,
					popdens  : document.getElementById("popdens").checked+0,
					mindens  : parseFloat(document.getElementById("mindens").value),
				};
				var desc = {...geoguessr.default_game_desc, ...desc};
				// Bounds
				var bounds = path.getPath().getArray();
				desc.bounds = bounds;
				// Points
				desc.points = points;
				return desc;
			}

			async function _save(serverless) {
				var desc  = settings_to_desc();
				if(serverless) return geoguessr.format_game_desc(desc);
				else {
					var id = await geoguessr.save_game_desc_server(desc);
					return "game="+id;
				}
			}

			async function submit(serverless) {
				points = await draw_points();
				var query = await _save(serverless);
				var url = "guess.html?" + query;
				window.location = url;
			}

			// save settings without submitting
			async function save(serverless) {
				var query = await _save(serverless);
				history.replaceState(null, "dummy", "build.html?" + query);
			}

			function undo_point() {
				path.getPath().pop();
			}
			function handle_key(e) {
				e = e || window.event;
				if(e.key == "Delete")
					undo_point();
			}
			function del_hidden(name) {
				var elem = document.getElementById("hidden_"+name);
				if(elem != null) elem.remove();
			}
			function add_hidden(parent, name, value) {
				var elem  = document.createElement("input");
				elem.type = "hidden";
				elem.name = name;
				elem.value= value;
				elem.id   = "hidden_" + name;
				parent.appendChild(elem);
			}

			async function draw_points() {
				var desc = settings_to_desc();

				// Handle the prior
				if(desc.popdens || desc.mindens) {
					// Convert from limit on population density to limit on pop in cell. Cells are 250m squared
					var minpop  = desc.mindens * 0.250**2;
					// This is a bit hacky, but this reads the population density, but skips cells below
					// minpop, and if the last argument is true, gives all cells equal weight by overriding
					// the population in the cell.
					var popinfo = await geoguessr.read_popinfo("norge_tetthet_250.txt", minpop, !desc.popdens);
					if(desc.bounds.length < 3) prior = geoguessr.prior_pop.bind(null, popinfo);
					else prior = geoguessr.prior_poly_pop.bind(null, desc.bounds, popinfo);
				} else {
					if(desc.bounds.length < 3) prior = geoguessr.prior_uniform;
					else prior = geoguessr.prior_poly_uniform.bind(null, desc.bounds);
				}

				var draw_settings = {prior: prior, roadonly: desc.roadonly, nearest: desc.nearest, spread:desc.spread};
				return new Promise((resolve, reject) => {
					geoguessr.draw_positions(desc.ntask,
						function (datas) {
							var points = datas.map(function (data) { return data.location.latLng; });
							resolve(points);
						}, draw_settings
					);
				});
			}
			document.addEventListener("keydown", handle_key);
		</script>
	</body>
</html>
